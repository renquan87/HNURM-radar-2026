# ============================================================
# pre-commit hooks 配置 — HNU RM 雷达站项目
#
# 安装:
#   pip install pre-commit
#   pre-commit install          # 注册 Git hooks
#
# 手动运行（全部文件）:
#   pre-commit run --all-files
#
# 跳过检查提交（紧急情况）:
#   git commit --no-verify -m "message"
# ============================================================

repos:
  # ── ruff: Python 代码检查 + 格式化 ──
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      # ruff lint（代码质量检查）
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi]

      # ruff format（代码格式化检查，不自动修改）
      - id: ruff-format
        name: ruff format check
        args: [--check]
        types_or: [python, pyi]

  # ── 通用文件检查 ──
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # 文件末尾添加换行符
      - id: end-of-file-fixer
        exclude: >-
          (?x)(
            ^src/hnurm_radar/ultralytics/|
            ^src/hnurm_radar/hnurm_radar/Camera/MvImport/|
            ^src/livox_ros_driver2/|
            ^src/Livox-SDK2/|
            ^src/Quatro/
          )

      # 去除行尾空格
      - id: trailing-whitespace
        exclude: >-
          (?x)(
            ^src/hnurm_radar/ultralytics/|
            ^src/hnurm_radar/hnurm_radar/Camera/MvImport/|
            ^src/livox_ros_driver2/|
            ^src/Livox-SDK2/|
            ^src/Quatro/
          )

      # 检查 YAML 语法
      - id: check-yaml
        args: [--allow-multiple-documents]

      # 检查 JSON 语法
      - id: check-json

      # 防止直接提交到 main 分支
      - id: no-commit-to-branch
        args: [--branch, main]

      # 检查大文件（>500KB）
      - id: check-added-large-files
        args: [--maxkb=500]
        exclude: >-
          (?x)(
            \.pcd$|
            \.engine$|
            \.onnx$|
            \.pt$
          )

      # 检查合并冲突标记
      - id: check-merge-conflict
