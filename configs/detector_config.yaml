# 路径使用相对于项目根目录的相对路径，代码会自动通过 paths.resolve_path() 解析为绝对路径
path:
  stage_one_path:  "data/weights/stage_one/stage_one.pt"
  stage_two_path:  "data/weights/stage_two/stage_two.pt"
  stage_three_path: "data/weights/stage_three/stage_three.pt"
  tracker_path: "configs/bytetrack.yaml"

params:
  labels: ["B1", "B2", "B3", "B4", "B5", "B7", "R1", "R2", "R3", "R4", "R5", "R7"]
  stage_one_conf: 0.1
  stage_two_conf: 0.6
  stage_three_conf: 0.5
  life_time: 90                       # 生命周期
  # 灰色装甲板亮度阈值（用于 Stage3 灰色判定）
  gray_threshold:
    blue: 35                          # 蓝方灰色阈值
    red: 15                           # 红方灰色阈值
    stage3: 30                        # Stage3 通用阈值

# 推理/显示分辨率（detector_node 和 camera_detector 共用）
resolution:
  infer_width: 1920                   # 推理输入宽度
  infer_height: 1080                  # 推理输入高度
  display_width: 1920                 # 检测结果显示宽度
  display_height: 1080                # 检测结果显示高度

# [已弃用] 3D 物理空间卡尔曼参数 (当前纯视觉链条使用 bbox_kalman 像素滤波器)
# filter:
#   process_noise: 0.1
#   measurement_noise: 0.02
#   jump_threshold: 1.5
#   max_velocity: 6.0
#   max_inactive_time: 3.0

# 匈牙利匹配 tracker 参数 (主追踪链路控制)
track:
  iou_thr: 0.05                # IoU 门控下限
  dist_thr: 80                 # 中心距离门控 (像素空间距离) 原来：120
  lost_thr: 3                  # 漏检 1~3 帧: 维持 TRACKING 状态，防闪烁
  guess_thr: 18                # 漏检 4~18 帧: 进入 LOST 状态，强制惯性发布
  max_miss: 54                 # 漏检 >54 帧 (约 1.8s): 目标彻底移除
  publish_predict_when_no_det: true  # 漏检 19~54 帧 (GUESSING 状态) 时是否继续发布预测
  
is_record: true
record_fps: 60