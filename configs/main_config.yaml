
global:
  my_color: "Red" # "Blue"
  is_debug: True # False
  scene: "competition"  # "competition" = 赛场（28x15m）| "lab" = 实验室测试
  # 调试坐标发布开关
  # true  = 调试模式: 地面方案二和空中检测的所有坐标都经 location→EKF 发布（含非标准ID映射）
  # false = 赛场模式: 仅标准 ID (1-7/101-107) 经 EKF 发布, 其余全部丢弃, 杜绝干扰项
  # ⚠ 比赛时必须设为 false!
  debug_coordinate_publish: true

# 场景配置：不同场景使用不同的地图和点云文件
# 切换场景只需修改 global.scene，无需替换文件
scenes:
  competition:
    std_map: "map/std_map.png"              # 方案二display_panel 底图
    pfa_map: "map/pfa_map_2025.jpg"         # 方案一透视标定用地图（通用）
    pfa_map_red: "map/pfa_map_red_2025.jpg"   # 红方视角地图（标定/小地图用）
    pfa_map_blue: "map/pfa_map_blue_2025.jpg" # 蓝方视角地图（标定/小地图用）
    pcd_file: "data/pcds.pcd"               # 点云地图
    downsampled_pcd: "data/pcds_downsampled.pcd"
    field_width: 28.0                       # 赛场宽度(m)
    field_height: 15.0                      # 赛场高度(m)
  lab:
    std_map: "map/lab_map_28x15.png"        # 实验室 display_panel 底图（裁剪后2800×1500）
    std_map_grid: "map/lab_map_28x15_grid.png"  # 带坐标网格的版本（调试用）
    pfa_map: "map/lab_map_28x15.png"        # 实验室透视标定用地图
    pcd_file: "data/lab_pcds.pcd"           # 实验室点云地图
    downsampled_pcd: "data/lab_pcds_downsampled.pcd"  # 实验室降采样点云地图
    field_width: 28.0                       # 由标定工具自动更新
    field_height: 15.0                      # 由标定工具自动更新

# 相机输入配置（仅用于纯相机透视变换方案 camera_detector）
camera:
  mode: "video"               # "test": 测试模式(静态图片) | "video": USB摄像头/视频文件 | "hik": 海康工业相机
  exposure_time: 15000.0       # 曝光时间(μs)。室内建议 15000~25000，室外/赛场建议 5000~10000。过大=过曝，过小=欠曝
  gain: 20.0                  # 增益(dB)。越大越亮但噪点越多。建议范围 10~25
  video_source: /data/projects/radar/hnurm_radar/test_resources/7.27-华东理工-00.04.40.729-00.28.10.978-seg2.mp4             # video 模式下的输入源：0=USB摄像头, 或视频文件路径如 "/path/to/video.mp4"
  test_image: "test_resources/red1.png"  # test 模式下使用的图片路径（相对于项目根目录）


car:
  life_span: 20 # 20帧若未刷新则认为不可信

lidar:
  height_threshold: 5.5 # 还没有量，激光雷达如果点比负1.4小，则认为在地面，不要
  min_distance: 1 # 去除距离在这个范围以内的接收点云
  max_distance: 40 # 去除距离在这个范围以外的接收点云
  lidar_topic_name: "/livox/lidar" # 点云发布话题名字

communication:
  port: '/dev/ttyUSB0' # 串口
  bps: 115200 # 波特率
  timex: 0.01 # 超时时间


# ============== 空中机器人检测配置（方案三：纯激光雷达） ==============
# 完整数据流：/lidar_pcds → ROI裁剪 → 体素降采样 → 背景减除 → 高度过滤
#            → [多帧缓冲] → DBSCAN聚类 → 目标筛选 → 卡尔曼跟踪 → TF坐标变换
#            → /location → ekf_node → display_panel
#
# RoboMaster 2026 空中机器人规格（来自规则手册 V1.3.0）：
#   最大伸展尺寸: 1700×1700×800mm（不含竖直保护杆）
#   最大重量: 13kg（含电池，不含裁判系统）
#   必须安装全包裹螺旋桨防护罩
#   飞行高度: 最低点距地面 ≥ 1.5m，不得超过围挡最高处(2.4m)
#   安全绳: 2.4m，拴绳夹具距己方侧边 ~14m
#   赛场: 28m × 15m，2.4m 黑色钢围挡
air_target:
  enabled: True                    # 是否启用空中机器人检测（false=完全关闭，不消耗算力）
  publish_rate: 10.0               # 检测发布频率 (Hz)；越高延迟越低但CPU占用越高；建议5~20Hz
  strict_dual_uav: false           # true=最多2架(红1蓝1, id固定6/106, 符合裁判系统协议)
                                   # false=不限制数量, 每个目标有独立ID(调试推荐，可同时观察多个检测)
  max_targets: 0                   # strict_dual_uav=false 时最多发布目标数；0=不限制
  field_split_x: 14.0              # 赛场 MAP 坐标中线x(m)；X<14=蓝方半区，X≥14=红方半区（28m赛场）

  # ---- 点云预处理 ----
  # 三层过滤流水线：ROI裁剪 → 体素降采样 → 高度过滤
  preprocessing:
    roi:                           # ROI 裁剪范围（livox 雷达坐标系，右手系，单位: m）
                                   # X=正前方, Y=左方, Z=上方
                                   # 只保留此范围内的点云，过滤远距离噪声和无关区域
                                   # 比赛时应覆盖整个赛场（28×15m + 安全余量）
      x_min: -1.0                 # 前后方向最小值（X=正前方，负值=雷达后方）
      x_max: 15.0                  # 前后方向最大值
      y_min: -4.0                  # 左右方向最小值（Y=左方，负值=右方）
      y_max: 5.0                  # 左右方向最大值
      z_min: -1.3                  # 高度最小值（需低于地面 z≈-1.05，让 BG 学习地面）
      z_max: 6                   # 高度最大值（LiDAR 上方，包含天花板/灯具供 BG 学习）
    voxel_size: 0.05               # 体素降采样大小 (m)；越小精度越高但点数越多、CPU越高
                                   # 推荐0.03~0.08；空中目标稀疏，0.05是较好平衡
    height_filter:                 # 高度过滤：只保留空中区域的点云
                                   # Livox HAP 坐标系：LiDAR在Z=0，Z轴向上为正
                                   # 更负 = 更接近地面（如地面 z≈-1.05）
                                   # 更接近0 = 更高/更接近LiDAR（如无人机顶 z≈-0.5）
                                   # 实验室实测：无人机 z ∈ [-0.97, -0.5]，地面 z≈-1.05
                                   # ☸ 需根据实际雷达安装高度调整！
      z_min: -0.85                   # Z 下界（接近地面侧）；地面(-1.05)上方 0.05m，无人机腿(-0.97)下方 0.03m
      z_max: -0.2                  # Z 上界（接近LiDAR侧）；无人机顶(-0.5)上方 0.15m
                                   # z_max - z_min = 0.65m 跨度，无人机~0.47m高，余量充足
                                   # ⚠ ROI.z 范围必须 > height_filter 范围，否则 BG 在线学习会失效！
    adaptive_height:               # 自适应高度：根据已跟踪目标的实际高度动态调整过滤区间
      enabled: false               # 暂不启用；未调试前用固定区间更稳定
      margin: 0.25                 # 跟踪目标高度上下扩展余量 (m)
      min_span: 0.5                # 自适应区间最小跨度 (m)；防止区间缩得太窄
      max_span: 2.0                # 自适应区间最大跨度 (m)；防止区间扩得太宽

  # ---- DBSCAN 聚类参数 ----
  # DBSCAN 是密度聚类算法：在 eps 半径内有 ≥ min_samples 个点，则归为同一簇
  # 调参指南：
  #   eps 太小 → 同一目标被分成多个簇（欠聚类）
  #   eps 太大 → 多个目标被合成一个簇（过聚类）
  #   min_samples 太大 → 远距离点云稀疏时检测不到（假阴性↑）
  #   min_samples 太小 → 噪声也会成簇（假阳性↑）
  # 建议先固定 min_samples=5，调 eps 直到目标被完整聚成1个簇
  # 调试方法：
  #   1. 启动系统，摆放无人机在不同距离
  #   2. 观察 RViz 中 air_debug/cluster_markers 包围盒
  #   3. 如果无人机被分成多个簇 → 增大 eps
  #   4. 如果多个物体被合成1个簇 → 减小 eps
  #   5. 可用 scripts/air_param_grid_search.py 自动网格搜索最优参数
  clustering:
    eps: 0.15                      # 邻域半径 (m)；两点距离 < eps 则互为邻居
                                   # 与体素大小相关，通常 eps ≈ 3~6 × voxel_size
                                   # 0.15m = 3×voxel_size，打断BG残余桥接链
                                   # 0.2时BG残留把无人机拖进4.6m超级簇；0.15可断链
                                   # 若远距离(10m+)目标欠聚类(被拆成多个)，可回调到0.18
    min_samples: 5                 # 最少邻居点数；一个点的 eps 邻域内至少要有这么多点才算核心点
                                   # 越大抗噪能力越强，但远距离稀疏时可能检测不到
                                   # 5-10之间调整，远距离场景可降到3
    z_zip: 0.5                     # Z 轴压缩系数（HITS 特性）；聚类前将 Z 坐标 × z_zip
                                   # 作用：让水平距离在聚类中权重更大，避免高度差导致
                                   # 同一目标被分裂。0.5 = Z方向距离权重减半
    backend: "open3d"              # 聚类后端：open3d（C++底层，更快） 或 sklearn（纯Python）
    split_merged: true             # 是否尝试分裂过大的簇（两架无人机靠近时可能被合并）
    split_size_xy: 2.0             # 触发分裂的XY最大尺寸阈值 (m)；簇XY跨度超过此值才尝试分裂
                                   # 单架无人机最大~1.7m，设2.0避免单体被误劈
    split_min_gap: 0.15            # 分裂最小间隙 (m)；沿主轴投影的最大间隙必须 > 此值
                                   # 0.15m ≈ 1个BG体素，足以区分两架靠近的无人机
    split_min_points: 12           # 分裂后每半段至少需要的点数

  # ---- 空中目标筛选参数 ----
  # 聚类后对每个簇做过滤，只保留像无人机的簇
  # 根据规则手册 V1.3.0：无人机最大 1700×1700×800mm，含全包裹防护罩
  # 实际 LiDAR 可见尺寸约 0.3~1.5m（取决于距离和角度）
  #
  # 置信度计算公式（决定目标是否被发布）：
  #   confidence = 0.8 × 点数评分(对数) + 0.2 × 尺寸评分
  #   点数评分 = (log(n) - log(min_points)) / (log(max_points) - log(min_points))
  #   尺寸评分 = 最大维度在[min_size, max_size]中间时最高(1.0)，越近边界越低
  #   对数点数评分让大点数远离小点数：
  #     30点→0.00, 100点→0.31, 200点→0.49, 400点→0.67, 800点→0.85
  #   例如：480点无人机，点数评分=0.72，尺寸评分~0.8 → conf=0.72*0.8+0.8*0.2=0.74
  #         150点假阳性，点数评分=0.42，尺寸评分~0.6 → conf=0.42*0.8+0.6*0.2=0.46
  #   → 阈值 0.35 即可滤掉大部分假阳性，同时保留无人机
  target_filter:
    min_points: 500                 # 最小点数；少于此值的簇视为噪声丢弃
                                   # ❗ 体素降采样(0.05m)后点数大幅减少！
                                   # 实测无人机在6m距离下降采样后约480点
                                   # 设30可过滤大量5-27点的BG残余碎片
                                   # 远距离场景可降到10-15
    max_points: 5000               # 最大点数；超过此值的簇太大，可能是结构物
                                   # 实测：老无人机(全包裹立方框)近距5-6m约3200点
                                   # 5000留足余量；超大簇(BG残余合并)被直接拒绝
                                   # 同时让对数置信度尺度更紧凑，提升区分度
    min_size: 1.0                  # 最小尺寸 (m)；簇的最大维度 < 此值 → 太小，丢弃
    max_size: 3.5                  # 最大尺寸 (m)；簇的最大维度 > 此值 → 太大，丢弃
                                   # 无人机最大1.7m(含防护罩)；3.5m 容纳近距点云扩散
                                   # 同时让尺寸评分生效：1.64m无人机得≈0.91分（99时仅0.03）
    confidence_threshold: 0.1    # 检测置信度阈值（0~1）；低于此值的目标不发布
                                   # 置信度 = 0.8×点数评分(对数) + 0.2×尺寸评分
                                   # 新参数下(max_pts=5000,max_size=3.5)的实测置信度：
                                   #   老无人机(3200pt,1.64m) → ≈0.90  ✅
                                   #   测试无人机(450pt,0.5m) → ≈0.47  ❌
                                   #   BG残余(100-200pt)     → ≈0.30  ❌
                                   # 0.55 精确隔离：只有大型无人机通过
                                   # ⚠ 比赛时远距离(15m+)无人机点数少，可能需降到0.35-0.45

  # ---- 目标跟踪（卡尔曼滤波 + 跨帧关联） ----
  # 对齐 HITS-radar-2024 的 KalmanFilter.cpp 实现
  # 跟踪器为每个目标维护独立的卡尔曼滤波器，状态 = [x, y, vx, vy]
  tracking:
    enabled: true                  # 是否启用跟踪（禁用=每帧独立检测，无跨帧关联）
    max_lost_frames: 120           # 目标丢失超过此帧数才删除（HITS: last_frames）
                                   # 120帧 ≈ 12秒(10Hz)，无人机可能被遮挡较久
    match_distance: 6.0            # 马氏距离阈值（HITS: dist_thres）
                                   # 新检测与已跟踪目标的马氏距离 < 此值才关联
                                   # 越大越容易匹配（但可能关联错误的目标）
    force_combine_dist: 0.5        # 强制合并距离 (m)；两个目标距离 < 此值 → 合并
    cc_thres: 0.05                 # 包围盒接触阈值 (m)；边界距离 < 此值 → 视为接触
    combine_limit: 15              # 被合并前最大丢失帧数
    separate_limit: 8              # 错误合并判定最大丢失帧数
    confirm_frames: 2              # 确认窗口：连续观测 ≥ N 帧才正式发布（防单帧噪声误报）
                                   # 1=立即发布（快响应但噪声多）；3+=更稳定但延迟增大
    kalman:
      # 以下参数严格对齐 HITS KalmanFilter.cpp 默认值
      # 通常不需要修改，除非对跟踪平滑度/响应速度有特殊要求
      q_pos: 1.0e-7               # 位置过程噪声（越大 → 滤波器越信任观测，响应越快）
      q_vel: 5.0e-6               # 速度过程噪声
      q_pv:  5.0e-6               # 位置-速度交叉过程噪声
      r_pos: 5.0e-2               # 位置观测噪声（越大 → 滤波器越信任预测，轨迹越平滑）
      r_vel: 5.0e-2               # 速度观测噪声
      decay_rate: 1.0e-4           # 速度衰减（模拟空气阻力，防止丢失目标后速度无限漂移）
      max_velocity: 10.0           # 最大速度限幅 (m/s)；无人机最大速度约3-5m/s
      cov_factor: 2.5              # 动态Q放大系数（速度越大 → 过程噪声越大 → 响应更快）
      stop_p_time: 40              # 丢失帧数超过此值后停止协方差P增长（防发散）
      init_p_times: 20             # 初始协方差 P = Q × init_p_times（HITS: P0=Q*p_times）

  # ---- 松弛查询（HITS 特性：丢失目标的宽松重搜索） ----
  # 目标短暂丢失(< max_lost_frames帧)时，在最后已知位置附近
  # 用更宽松的聚类参数重新搜索，提高跟踪连续性
  loose_query:
    enabled: true                  # 是否启用松弛查询
    max_lost_frames: 5             # 丢失帧数 < 此值时触发松弛查询
    expand_xy: 1.0                 # XY方向搜索范围扩展 (m)
    expand_z: 0.5                  # Z方向搜索范围扩展 (m)
    eps_scale: 1.4                 # 松弛时 eps 放大倍数（更容易聚类）
    min_samples_scale: 0.6         # 松弛时 min_samples 缩小倍数（降低密度要求）

  # ---- 背景减除 ----
  # 体素网格方法：统计每个体素被占据的帧数，超过阈值→标记为背景→后续过滤
  # 区分"在线学习"和"PCD预加载"两种模式（可同时启用）：
  #   在线学习：前 learning_frames 帧跳过飞行区域 [z_min, z_max]，避免学入悬停无人机
  #   PCD预加载：从预建地图加载全部点(含空中固定结构)作为背景，场景无动态目标
  background:
    enabled: true                  # 是否启用背景减除
    voxel_size: 0.15               # 背景体素大小 (m)；越小背景越精细但内存占用越高
    occupy_threshold: 5            # 占据阈值；体素被观测 ≥ 此次数 → 视为背景
    learning_frames: 10            # 在线学习帧数（前N帧建立背景模型）；0=持续学习
    bg_pcd_file: "data/lab_pcds.pcd"  # 预建PCD地图路径（空=""则纯在线学习）
                                   # 比赛时改为 "data/pcds.pcd"
                                   # PCD预加载会使用全部高度的点作为背景（因PCD是纯静态场景）
                                   # ⚠ PCD必须在无人机起飞前采集，否则会把无人机学进背景

  # ---- 多帧缓冲 ----
  # 叠加最近 frame_count 帧的空中区域点云后再聚类
  # 优点：增加点密度，远距离稀疏目标更容易聚成簇
  # 缺点：引入 (frame_count-1)/publish_rate 秒延迟，快速移动目标可能拖影
  # 建议先关闭(false)，确认基本检测正常后再开启调优
  buffer:
    enabled: false                 # 是否启用多帧缓冲
    frame_count: 3                 # 缓冲帧数；2-5帧，越多点密度越高但延迟越大

area: # 每一个area是一个列表，元素为点的二元组，表示一个凹多边形 , 从左上角逆时针 , 赛场是对称的，红方左下为原点0，0，蓝方右上为28，15
  hero_times_threshold: 2 # 连续2帧检测到英雄才认为英雄在这个区域
  send_double_threshold: 10 # 连续10帧检测到英雄启动双倍易伤
  Blue: # 我方为蓝色时
    length: 5 # 5个区域
    area0:
      - [12.05, 15.0]
      - [12.05, 14.30]
      - [13.68, 12.85]
      - [15.02, 14.27]
      - [15.02, 15.0] # 红方英雄下台阶
    area1:
      - [13.68, 12.85]
      - [16.0, 10.0]
      - [18.0, 10.8]
