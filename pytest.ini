# ============================================================
# pytest 配置 — HNU RM 雷达站项目
# ============================================================
[pytest]
# 测试文件搜索路径
testpaths = tests

# 测试文件命名模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 默认运行参数
addopts =
    -v
    --tb=short
    --strict-markers

# 自定义 markers
markers =
    unit: 纯函数/纯逻辑单元测试（无硬件/ROS 依赖）
    integration: 集成测试（可能需要配置文件或模型文件）
    slow: 耗时较长的测试（模型推理等）
    hardware: 需要硬件设备的测试（相机、串口等）
